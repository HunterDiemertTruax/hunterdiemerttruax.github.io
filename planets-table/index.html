<body>

  <!-- Wrap the top-level heading in a header element -->
  <header>
    <h1>Planets Data</h1>
  </header>

  <!-- Add a main element to contain the table -->
  <main>

    <!-- Add the table element. This will contain your table caption, column group, table head, table body, and the data. -->
    <table>

      <!-- The caption element should be the first child of the table element, and wrap the following text and link. -->
      <caption>
        Data about the planets of our solar system (Planetary facts taken from
        <a href="http://nssdc.gsfc.nasa.gov/planetary/factsheet/">Nasa's Planetary Fact Sheet - Metric</a>).
      </caption>

      <!-- The second child of the table element should be the colgroup element -->
      <colgroup>
        <col span="2" title="Planet group and name">
        <col title="Mass">
        <col title="Diameter">
        <col title="Density">
        <col title="Gravity">
        <col title="Length of day">
        <col title="Distance from Sun">
        <col title="Mean temperature">
        <col title="Number of moons">
        <col title="Notes">
        <col title="Image">
      </colgroup>

      <!-- The table head element should be the third child of the table element -->
      <thead>
        <tr>
          <th scope="col" colspan="2">Name</th>
          <th scope="col">Mass (10<sup>24</sup>kg)</th>
          <th scope="col">Diameter (km)</th>
          <th scope="col">Density (kg/m<sup>3</sup>)</th>
          <th scope="col">Gravity (m/s<sup>2</sup>)</th>
          <th scope="col">Length of day (hours)</th>
          <th scope="col">Distance from Sun (10<sup>6</sup>km)</th>
          <th scope="col">Mean temperature (°C)</th>
          <th scope="col">Number of moons</th>
          <th scope="col">Notes</th>
          <th scope="col">Image</th>
        </tr>
      </thead>

      <!-- The fourth child of the table element should be the table body element -->
      <tbody>
        <!-- planet rows go here -->
      </tbody>

    </table>
  </main>

</body>
